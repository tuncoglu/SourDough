name = "sourdough-proxy"
main = "index.js"
compatibility_date = "2026-07-01"

# Proxy worker: serves sourdough Pages project at enftc.co.uk/sourdough/
route = { pattern = "enftc.co.uk/sourdough/*", zone_name = "enftc.co.uk" }

[vars]
PAGES_PROJECT = "sourdough"

[env.production]
route = { pattern = "enftc.co.uk/sourdough/*", zone_name = "enftc.co.uk" }
