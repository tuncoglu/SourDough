name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SourDoughMobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: SourDoughMobile

      - name: Build web export
        run: npx expo export --platform web
        working-directory: SourDoughMobile

      - name: Ensure Cloudflare _headers is present
        run: cp -f SourDoughMobile/public/_headers SourDoughMobile/dist/_headers 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy SourDoughMobile/dist --project-name=sourdough --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

